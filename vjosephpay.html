<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>VJoseph Pay</title>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/prop-types@15/prop-types.min.js"></script>
<script src="https://unpkg.com/recharts@2.12.7/umd/Recharts.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { height: 100%; background: #07070F; }
@import url('https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap');
body { font-family: 'Sora', system-ui, sans-serif; }
input::placeholder, textarea::placeholder { color: rgba(255,255,255,0.2); }
textarea { resize: none; }
::-webkit-scrollbar { width: 3px; height: 3px; }
::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 2px; }

.vjp-sidebar {
  position: fixed; left: 0; top: 0; height: 100%;
  width: 64px; z-index: 50;
  background: linear-gradient(180deg,#08080f,#0d0d14);
  border-right: 1px solid rgba(255,255,255,0.05);
  display: flex; flex-direction: column;
  transition: width 0.25s ease;
}
@media (min-width: 900px) {
  .vjp-sidebar { width: 220px; }
  .vjp-sidebar .lbl { display: block !important; }
  .vjp-sidebar .logo-text { display: block !important; }
}
.vjp-main { margin-left: 64px; min-height: 100vh; }
@media (min-width: 900px) { .vjp-main { margin-left: 220px; } }
@media (max-width: 639px) {
  .vjp-sidebar { display: none; }
  .vjp-main { margin-left: 0; padding-bottom: 80px; }
  .vjp-bnav { display: flex !important; }
}
.vjp-bnav {
  display: none;
  position: fixed; bottom: 0; left: 0; right: 0; z-index: 50;
  background: rgba(7,7,15,0.97); backdrop-filter: blur(24px);
  border-top: 1px solid rgba(255,255,255,0.07);
  padding: 6px 0 12px; justify-content: space-around;
}
.kpi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
@media (min-width: 640px) { .kpi-grid { grid-template-columns: repeat(3,1fr); } }
@media (min-width: 900px) { .kpi-grid { grid-template-columns: repeat(4,1fr); } }
.two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
</style>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800;900&display=swap" rel="stylesheet">
</head>
<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect, useRef } = React;
const { AreaChart, Area, XAxis, YAxis, Tooltip, ResponsiveContainer, CartesianGrid, BarChart, Bar } = Recharts;

// ── THEME ──────────────────────────────────────────────────────────────
const G = "#00FF87", B = "#00C9FF", P = "#A78BFA";
const BG = "#07070F", CARD = "rgba(255,255,255,0.04)", BDR = "rgba(255,255,255,0.07)";
const F = "'Sora', system-ui, sans-serif";

// ── CHART DATA ─────────────────────────────────────────────────────────
const mkData = (n, base, variance) =>
  Array.from({length:n},(_,i)=>({i, v: Math.max(0, base+Math.floor((Math.random()-0.4)*variance))}));
const PERIODS = {
  hoje:      { data: mkData(8,320,300).map((d,i)=>({...d,label:`${8+i}h`})), label:"Hoje" },
  semana:    { data: mkData(7,800,700).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]})), label:"Esta semana" },
  mes:       { data: mkData(30,600,800).map((d,i)=>({...d,label:i+1})), label:"Este mês" },
  trimestre: { data: mkData(12,2000,2000).map((d,i)=>({...d,label:`S${i+1}`})), label:"Trimestre" },
  ano:       { data: mkData(12,8000,6000).map((d,i)=>({...d,label:["Jan","Fev","Mar","Abr","Mai","Jun","Jul","Ago","Set","Out","Nov","Dez"][i]})), label:"Ano" },
};

// ── SHARED ─────────────────────────────────────────────────────────────
function Tag({status}) {
  const m = {
    pago:{bg:"rgba(0,255,135,0.1)",tx:G}, pendente:{bg:"rgba(255,190,0,0.1)",tx:"#FFBE00"},
    cancelado:{bg:"rgba(255,60,60,0.1)",tx:"#FF4444"}, ativo:{bg:"rgba(0,255,135,0.1)",tx:G},
    inativo:{bg:"rgba(255,60,60,0.1)",tx:"#FF4444"},
  };
  const s = m[status]||{bg:"rgba(255,255,255,0.1)",tx:"#fff"};
  return <span style={{background:s.bg,color:s.tx,border:`1px solid ${s.tx}22`,fontSize:10,fontWeight:700,padding:"3px 9px",borderRadius:20,letterSpacing:"0.05em",textTransform:"uppercase",whiteSpace:"nowrap"}}>{status}</span>;
}

function Pill({label,value,accent,sub}) {
  return (
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:16,padding:"15px 16px",flex:1,minWidth:0}}>
      <div style={{color:"rgba(255,255,255,0.35)",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:5}}>{label}</div>
      <div style={{color:accent||"white",fontSize:19,fontWeight:900,letterSpacing:"-0.02em"}}>{value}</div>
      {sub&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:3}}>{sub}</div>}
    </div>
  );
}

function KPICard({label,value,sub,accent,icon}) {
  return (
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:18,padding:"18px",position:"relative",overflow:"hidden"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:10}}>
        <span style={{color:"rgba(255,255,255,0.35)",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase"}}>{label}</span>
        <span style={{color:accent||G,opacity:0.7,fontSize:16}}>{icon}</span>
      </div>
      <div style={{color:accent||"white",fontSize:22,fontWeight:900,letterSpacing:"-0.02em"}}>{value}</div>
      {sub&&<div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginTop:4}}>{sub}</div>}
      <div style={{position:"absolute",bottom:-20,right:-20,width:60,height:60,borderRadius:"50%",background:accent||G,opacity:0.05}}/>
    </div>
  );
}

function Btn({children,onClick,color,outline,sm}) {
  return (
    <button onClick={onClick} style={{background:outline?"transparent":`linear-gradient(135deg,${color||G},${B})`,border:outline?`1px solid ${color||G}44`:"none",borderRadius:sm?10:14,padding:sm?"8px 16px":"13px",color:outline?(color||G):"#000",fontWeight:900,fontSize:sm?12:14,cursor:"pointer",width:outline?"auto":"100%",fontFamily:F}}>
      {children}
    </button>
  );
}

function AdvancedChart({accent=G}) {
  const [period,setPeriod]=useState("semana");
  const pd=PERIODS[period];
  const total=pd.data.reduce((a,d)=>a+d.v,0);
  const gid=`g-${period}-${accent.replace("#","")}`;
  return (
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"18px 16px"}}>
      <div style={{display:"flex",gap:4,marginBottom:14,overflowX:"auto",paddingBottom:2}}>
        {Object.keys(PERIODS).map(p=>(
          <button key={p} onClick={()=>setPeriod(p)} style={{padding:"5px 10px",borderRadius:20,border:`1px solid ${p===period?accent+"44":BDR}`,background:p===period?`${accent}12`:"transparent",color:p===period?accent:"rgba(255,255,255,0.35)",fontSize:10,fontWeight:700,cursor:"pointer",flexShrink:0,textTransform:"capitalize",fontFamily:F}}>{p}</button>
        ))}
      </div>
      <div style={{marginBottom:12}}>
        <div style={{color:"white",fontWeight:800,fontSize:14}}>{pd.label}</div>
        <div style={{color:accent,fontWeight:900,fontSize:22,letterSpacing:"-0.03em",marginTop:2}}>R$ {total.toLocaleString()}</div>
      </div>
      <div style={{height:130}}>
        <ResponsiveContainer width="100%" height="100%">
          <AreaChart data={pd.data} margin={{top:4,right:4,left:-32,bottom:0}}>
            <defs>
              <linearGradient id={gid} x1="0" y1="0" x2="0" y2="1">
                <stop offset="0%" stopColor={accent} stopOpacity={0.25}/>
                <stop offset="100%" stopColor={accent} stopOpacity={0}/>
              </linearGradient>
            </defs>
            <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.04)" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false} interval="preserveStartEnd"/>
            <YAxis hide/>
            <Tooltip contentStyle={{background:"#10101A",border:`1px solid ${accent}33`,borderRadius:10,color:"#fff",fontSize:12}} formatter={v=>[`R$ ${v.toLocaleString()}`,"Receita"]} labelStyle={{color:"rgba(255,255,255,0.5)",fontSize:10}}/>
            <Area type="monotone" dataKey="v" stroke={accent} strokeWidth={2} fill={`url(#${gid})`} dot={false}/>
          </AreaChart>
        </ResponsiveContainer>
      </div>
    </div>
  );
}

function VisitorChart() {
  const data=mkData(7,120,150).map((d,i)=>({...d,label:["Seg","Ter","Qua","Qui","Sex","Sáb","Dom"][i]}));
  return (
    <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,padding:"18px 16px"}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
        <div>
          <div style={{color:"white",fontWeight:800,fontSize:14}}>Visitantes da página</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,marginTop:2}}>protocolog9.vjosephpay.com</div>
        </div>
        <span style={{background:`${B}15`,color:B,border:`1px solid ${B}25`,fontSize:11,fontWeight:700,padding:"3px 10px",borderRadius:20}}>{data.reduce((a,d)=>a+d.v,0)} visitas</span>
      </div>
      <div style={{height:100}}>
        <ResponsiveContainer width="100%" height="100%">
          <BarChart data={data} margin={{top:4,right:4,left:-32,bottom:0}}>
            <CartesianGrid strokeDasharray="2 4" stroke="rgba(255,255,255,0.04)" vertical={false}/>
            <XAxis dataKey="label" tick={{fill:"rgba(255,255,255,0.3)",fontSize:9}} axisLine={false} tickLine={false}/>
            <YAxis hide/>
            <Tooltip contentStyle={{background:"#10101A",border:`1px solid ${B}33`,borderRadius:10,color:"#fff",fontSize:12}} formatter={v=>[v+" visitantes",""]}/>
            <Bar dataKey="v" fill={`${B}60`} radius={[4,4,0,0]}/>
          </BarChart>
        </ResponsiveContainer>
      </div>
      <div style={{display:"flex",gap:12,marginTop:10}}>
        {[{l:"Sessões",v:"847",c:B},{l:"Conversão",v:"2.3%",c:G},{l:"Rejeição",v:"38%",c:"#F59E0B"}].map(k=>(
          <div key={k.l} style={{flex:1,textAlign:"center"}}>
            <div style={{color:k.c,fontWeight:900,fontSize:15}}>{k.v}</div>
            <div style={{color:"rgba(255,255,255,0.3)",fontSize:10}}>{k.l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CHAT IA ─────────────────────────────────────────────────────────────
const QQ=["📊 Como estão minhas vendas hoje?","💰 Quanto recebi esta semana?","🔗 Gerar link de afiliado","📈 Minha conversão está boa?","❓ Como configurar meu checkout?","🆘 Preciso de suporte"];
const AR={"📊 Como estão minhas vendas hoje?":"Hoje você teve 4 vendas totalizando R$ 1.240. Sua melhor hora foi às 14h com R$ 480. Está 18% acima da média! 🚀","💰 Quanto recebi esta semana?":"Esta semana você recebeu R$ 7.270 líquidos. Quarta foi seu melhor dia com R$ 2.100. Semana forte! 💪","🔗 Gerar link de afiliado":"Seu link: vjosephpay.com/ref/SEU_CODIGO — já está ativo! Cada venda gerada te dá comissão automática.","📈 Minha conversão está boa?":"Sua conversão atual é 2.3%. A média do mercado é 1.5-3%. Você está bem posicionado!","❓ Como configurar meu checkout?":"Vai em Templates > escolhe o modelo > preenche produto e valor > clica Criar. O link é gerado automaticamente.","🆘 Preciso de suporte":"Claro! Me conta o que aconteceu. Você também pode entrar em contato: suporte@vjosephpay.com"};
function ChatIA({productName}) {
  const [msgs,setMsgs]=useState([{role:"ai",text:`Olá! Sou a IA da VJoseph Pay. Estou aqui pra te ajudar com "${productName||"seu produto"}". O que precisa?`}]);
  const [input,setInput]=useState("");
  const [showQ,setShowQ]=useState(true);
  const bottom=useRef(null);
  useEffect(()=>{bottom.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  const send=(text)=>{
    const msg=text||input; if(!msg.trim())return;
    setInput(""); setShowQ(false);
    setMsgs(p=>[...p,{role:"user",text:msg}]);
    setTimeout(()=>{
      const reply=AR[msg]||"Entendi! Em breve conectado à IA real via API. Posso ajudar com dúvidas sobre vendas, checkout e afiliados!";
      setMsgs(p=>[...p,{role:"ai",text:reply}]);
    },600);
  };
  return (
    <div style={{display:"flex",flexDirection:"column",height:"calc(100vh - 140px)",minHeight:400}}>
      <div style={{background:`${B}0D`,border:`1px solid ${B}25`,borderRadius:14,padding:"10px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
        <div style={{width:8,height:8,borderRadius:"50%",background:G,boxShadow:`0 0 6px ${G}`,flexShrink:0}}/>
        <div style={{flex:1,minWidth:0}}>
          <div style={{color:"rgba(255,255,255,0.5)",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:"0.1em"}}>Seu site ativo</div>
          <div style={{color:"white",fontSize:12,fontWeight:700}}>protocolog9.vjosephpay.com</div>
        </div>
        <span style={{background:`${G}15`,color:G,border:`1px solid ${G}25`,fontSize:10,fontWeight:700,padding:"3px 8px",borderRadius:20,flexShrink:0}}>Online</span>
      </div>
      <div style={{flex:1,overflowY:"auto",display:"flex",flexDirection:"column",gap:10,marginBottom:12}}>
        {msgs.map((m,i)=>(
          <div key={i} style={{display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start"}}>
            {m.role==="ai"&&<div style={{width:28,height:28,borderRadius:10,background:`linear-gradient(135deg,${G},${B})`,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:900,color:"#000",flexShrink:0,marginRight:8,marginTop:2}}>V</div>}
            <div style={{maxWidth:"75%",padding:"10px 14px",borderRadius:16,fontSize:13,lineHeight:1.5,background:m.role==="user"?"rgba(0,255,135,0.12)":"rgba(255,255,255,0.05)",color:"white",border:`1px solid ${m.role==="user"?"rgba(0,255,135,0.2)":"rgba(255,255,255,0.06)"}`}}>{m.text}</div>
          </div>
        ))}
        {showQ&&(
          <div style={{display:"flex",flexDirection:"column",gap:6,marginTop:4}}>
            <div style={{color:"rgba(255,255,255,0.3)",fontSize:11,marginBottom:2}}>Perguntas rápidas:</div>
            {QQ.map(q=>(
              <button key={q} onClick={()=>send(q)} style={{textAlign:"left",padding:"9px 14px",borderRadius:12,background:"rgba(255,255,255,0.04)",border:`1px solid rgba(255,255,255,0.08)`,color:"rgba(255,255,255,0.7)",fontSize:12,cursor:"pointer",fontWeight:600,fontFamily:F}}>{q}</button>
            ))}
          </div>
        )}
        <div ref={bottom}/>
      </div>
      <div style={{display:"flex",gap:8,flexShrink:0}}>
        <input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==="Enter"&&send()} placeholder="Digite uma mensagem..." style={{flex:1,background:"rgba(255,255,255,0.05)",border:`1px solid rgba(255,255,255,0.09)`,borderRadius:12,padding:"11px 14px",color:"white",fontSize:13,outline:"none",fontFamily:F}}/>
        <button onClick={()=>send()} style={{width:44,height:44,borderRadius:12,background:`linear-gradient(135deg,${G},${B})`,border:"none",color:"#000",fontSize:18,cursor:"pointer",fontWeight:900,flexShrink:0}}>→</button>
      </div>
    </div>
  );
}

// ── AFILIADOS ─────────────────────────────────────────────────────────
function Afiliados({isAdmin}) {
  const list=[{name:"Carlos M.",code:"CARLOS10",vendas:12,comissao:"R$ 216,00",status:"ativo"},{name:"Fernanda R.",code:"FER20",vendas:8,comissao:"R$ 144,00",status:"ativo"},{name:"João K.",code:"JOAO5",vendas:3,comissao:"R$ 54,00",status:"inativo"}];
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={{background:`linear-gradient(135deg,rgba(167,139,250,0.09),rgba(0,201,255,0.05))`,border:`1px solid rgba(167,139,250,0.2)`,borderRadius:20,padding:"20px 18px"}}>
        <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:700,letterSpacing:"0.12em",textTransform:"uppercase",marginBottom:4}}>Seu link de afiliado</div>
        <div style={{color:"white",fontWeight:800,fontSize:14,marginBottom:10}}>vjosephpay.com/ref/RENATO15</div>
        <div style={{display:"flex",gap:8}}><Btn sm outline color={P}>Copiar link</Btn><Btn sm outline color={B}>Compartilhar</Btn></div>
      </div>
      <div className="two-col"><Pill label="Total afiliados" value="3" accent={P}/><Pill label="Comissão total" value="R$ 414" accent={G} sub="este mês"/></div>
      <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
        {isAdmin&&<div style={{padding:"14px 18px",borderBottom:`1px solid ${BDR}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}><span style={{color:"white",fontWeight:800,fontSize:14}}>Afiliados ativos</span><Btn sm outline color={G}>+ Convidar</Btn></div>}
        {!isAdmin&&<div style={{padding:"14px 18px",borderBottom:`1px solid ${BDR}`}}><span style={{color:"white",fontWeight:800,fontSize:14}}>Meu desempenho</span></div>}
        {isAdmin?list.map((a,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:12,padding:"13px 18px",borderBottom:i<list.length-1?`1px solid rgba(255,255,255,0.03)`:"none"}}>
            <div style={{width:36,height:36,borderRadius:12,background:`linear-gradient(135deg,${P},${B})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:13,color:"#000",flexShrink:0}}>{a.name[0]}</div>
            <div style={{flex:1,minWidth:0}}>
              <div style={{color:"white",fontWeight:700,fontSize:13}}>{a.name}</div>
              <div style={{color:"rgba(255,255,255,0.35)",fontSize:11,marginTop:1}}>Código: <span style={{color:P,fontWeight:700}}>{a.code}</span> · {a.vendas} vendas</div>
            </div>
            <div style={{textAlign:"right",flexShrink:0}}><div style={{color:G,fontWeight:800,fontSize:13}}>{a.comissao}</div><Tag status={a.status}/></div>
          </div>
        )):[{l:"Cliques no link",v:"234"},{l:"Vendas geradas",v:"12"},{l:"Taxa de conversão",v:"5.1%"},{l:"Comissão pendente",v:"R$ 72,00"}].map((r,i,arr)=>(
          <div key={r.l} style={{display:"flex",justifyContent:"space-between",padding:"12px 18px",borderBottom:i<arr.length-1?`1px solid rgba(255,255,255,0.04)`:"none"}}>
            <span style={{color:"rgba(255,255,255,0.4)",fontSize:13}}>{r.l}</span>
            <span style={{color:"white",fontWeight:800,fontSize:13}}>{r.v}</span>
          </div>
        ))}
      </div>
    </div>
  );
}

// ── CHECKOUT ──────────────────────────────────────────────────────────
function CheckoutView() {
  const [step,setStep]=useState(1);
  const [met,setMet]=useState("pix");
  return (
    <div style={{maxWidth:480,margin:"0 auto"}}>
      <div style={{display:"flex",gap:6,marginBottom:20}}>
        {[1,2,3].map(s=><div key={s} style={{flex:1,height:3,borderRadius:4,background:s<=step?G:"rgba(255,255,255,0.08)",transition:"background 0.3s"}}/>)}
      </div>
      <div style={{background:CARD,border:`1px solid ${BDR}`,borderRadius:20,overflow:"hidden"}}>
        <div style={{background:"linear-gradient(135deg,rgba(0,255,135,0.07),rgba(0,201,255,0.04))",padding:"20px 20px 16px",borderBottom:`1px solid ${BDR}`}}>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:11,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:4}}>Protocolo G9 · Renato</div>
          <div style={{color:"white",fontSize:32,fontWeight:900,letterSpacing:"-0.03em"}}>R$ 180,00</div>
          <div style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:2}}>ou 3× de R$ 60/mês</div>
        </div>
        <div style={{padding:20,display:"flex",flexDirection:"column",gap:14}}>
          {step===1&&<>
            {[{l:"Nome completo",p:"Seu nome completo"},{l:"E-mail",p:"seu@email.com",t:"email"},{l:"CPF / CNPJ",p:"000.000.000-00"}].map(f=>(
              <div key={f.l}>
                <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{f.l}</div>
                <input type={f.t||"text"} placeholder={f.p} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid rgba(255,255,255,0.09)`,borderRadius:12,padding:"11px 14px",color:"white",fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
            ))}
            <button onClick={()=>setStep(2)} style={{background:`linear-gradient(135deg,${G},${B})`,border:"none",borderRadius:14,padding:14,color:"#000",fontWeight:900,fontSize:14,cursor:"pointer",marginTop:4,fontFamily:F}}>Continuar →</button>
          </>}
          {step===2&&<>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
              {["pix","cartao"].map(m=>(

            </button>
            {CLIENTS.map(c=>(
              <button key={c.name} onClick={()=>{setRole("client");setClient(c);setStep(2);}} style={{background:CARD,border:`1px solid ${B}33`,borderRadius:18,padding:"18px",textAlign:"left",cursor:"pointer",display:"flex",alignItems:"center",gap:14}}>
                <div style={{width:48,height:48,borderRadius:15,background:`${B}12`,border:`1px solid ${B}28`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:20,color:B,flexShrink:0}}>{c.name[0]}</div>
                <div><div style={{color:"white",fontWeight:800,fontSize:15}}>{c.name}</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:12,marginTop:2}}>{c.email}</div><span style={{background:`${B}12`,color:B,border:`1px solid ${B}25`,fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:20,display:"inline-block",marginTop:6}}>Cliente</span></div>
              </button>
            ))}
          </div>
        )}
        {step===2&&(
          <div style={{display:"flex",flexDirection:"column",gap:14}}>
            <button onClick={()=>setStep(1)} style={{background:"none",border:"none",color:"rgba(255,255,255,0.4)",fontSize:13,cursor:"pointer",textAlign:"left",marginBottom:4,fontWeight:700,fontFamily:F}}>← Voltar</button>
            <div style={{background:CARD,border:`1px solid ${role==="admin"?G:B}33`,borderRadius:18,padding:"16px 18px",display:"flex",alignItems:"center",gap:12,marginBottom:4}}>
              <div style={{width:40,height:40,borderRadius:12,background:`linear-gradient(135deg,${role==="admin"?G:B},${B})`,display:"flex",alignItems:"center",justifyContent:"center",fontWeight:900,fontSize:16,color:"#000",flexShrink:0}}>{role==="admin"?"V":client?.name?.[0]}</div>
              <div><div style={{color:"white",fontWeight:800,fontSize:14}}>{role==="admin"?"Admin · VJoseph Pay":client?.name}</div><div style={{color:"rgba(255,255,255,0.4)",fontSize:12}}>{role==="admin"?"Acesso completo":"Painel do cliente"}</div></div>
            </div>
            {[{l:"E-mail",p:role==="admin"?"admin@vjosephpay.com":client?.email,t:"email"},{l:"Senha",p:"••••••••",t:"password"}].map(f=>(
              <div key={f.l}>
                <div style={{color:"rgba(255,255,255,0.4)",fontSize:10,fontWeight:700,letterSpacing:"0.1em",textTransform:"uppercase",marginBottom:6}}>{f.l}</div>
                <input type={f.t} placeholder={f.p} value={f.t==="email"?email:pass} onChange={e=>f.t==="email"?setEmail(e.target.value):setPass(e.target.value)} style={{width:"100%",background:"rgba(255,255,255,0.05)",border:`1px solid rgba(255,255,255,0.09)`,borderRadius:13,padding:"13px 15px",color:"white",fontSize:14,outline:"none",fontFamily:F}}/>
              </div>
            ))}
            <div style={{textAlign:"right"}}><span style={{color:role==="admin"?G:B,fontSize:12,fontWeight:700,cursor:"pointer"}}>Esqueci a senha</span></div>
            <button onClick={doLogin} style={{background:`linear-gradient(135deg,${role==="admin"?G:B},${B})`,border:"none",borderRadius:14,padding:14,color:"#000",fontWeight:900,fontSize:15,cursor:"pointer",boxShadow:`0 0 30px ${role==="admin"?G:B}25`,fontFamily:F}}>Entrar →</button>
            <div style={{textAlign:"center",color:"rgba(255,255,255,0.2)",fontSize:11,marginTop:4}}>🔒 Acesso seguro · VJoseph Pay</div>
          </div>
        )}
      </div>
    </div>
  );
}

// ── ROOT ──────────────────────────────────────────────────────────────
function App() {
  const [user,setUser]=useState(null);
  return (
    <div style={{background:BG,minHeight:"100vh",fontFamily:F}}>
      {!user&&<Login onLogin={setUser}/>}
      {user?.role==="admin"&&<AdminPanel onLogout={()=>setUser(null)}/>}
      {user?.role==="client"&&<ClientPanel clientName={user.name} onLogout={()=>setUser(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
